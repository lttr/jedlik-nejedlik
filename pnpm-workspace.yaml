packages:
  - web

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest

overrides:
  vite: "catalog:"
  vitest: "catalog:"
  "@vercel/nft": ^0.27.4

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

shamefullyHoist: true

allowBuilds:
  "@parcel/watcher": false
  "@sentry/cli": false
  esbuild: true
  fallow: true
  sharp: true
  unrs-resolver: true
  vue-demi: false
